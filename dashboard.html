<!DOCTYPE html>
<html lang="en" data-lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My workspace – The Prompt Studio</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/images/favicon-192.png">
  <link rel="shortcut icon" href="/assets/images/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="/js/ps-auth.js?v=1.0"></script>
  <script defer src="/js/ps-analytics.js?v=1.0"></script>
  <script defer src="/js/ps-tools-i18n.js?v=1.0"></script>
  <script defer src="/js/tool-catalog.js?v=1.0"></script>
  <script defer src="/js/ps-projects.js?v=1.0"></script>
  <script defer src="/js/ps-feedback.js?v=1.0"></script>
  <script defer src="/js/ps-ads.js?v=1.0"></script>
  <script defer src="/js/ps-lang.js?v=1.1"></script>
  <script defer src="/js/ps-i18n.js?v=1.0"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3e;
      --text:    #e8eaf0;
      --muted:   #7c8098;
      --accent:  #6c63ff;
      --accent2: #a78bfa;
      --sidebar: 240px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; overflow-x: hidden; width: 100%; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top:0; left:0; bottom:0; z-index: 50; }
    .sb-logo { padding: 22px 20px; border-bottom: 1px solid var(--border); }
    .sb-logo a { text-decoration: none; font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .sb-logo span { color: var(--accent2); }
    .sb-nav { flex: 1; padding: 14px 0; overflow-y: auto; }
    .nav-section { padding: 10px 18px 4px; font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 18px; color: var(--muted); text-decoration: none; font-size: .875rem; transition: background .14s, color .14s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: rgba(108,99,255,.07); color: var(--text); }
    .nav-item.active { background: rgba(108,99,255,.14); color: var(--accent2); }
    .nav-item .ico { font-size: 1rem; width: 20px; text-align: center; }

    /* Vertical nav items — dynamic color from VERTICALS constant */
    .nav-item[data-v].active { font-weight: 600; }

    .sb-footer { padding: 14px 18px; border-top: 1px solid var(--border); }
    .sb-email { font-size: .73rem; color: var(--muted); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn { display: flex; align-items: center; gap: 7px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: .85rem; padding: 5px 0; transition: color .14s; }
    .logout-btn:hover { color: #ef4444; }

    /* ── Main ── */
    .main { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; max-width: calc(100vw - var(--sidebar)); overflow-x: hidden; min-width: 0; }

    /* Top bar */
    .topbar { padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; }
    .topbar-left h1 { font-size: 1.2rem; font-weight: 700; }
    .topbar-left p  { font-size: .82rem; color: var(--muted); margin-top: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    /* Quota pill */
    .quota-pill { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: .8rem; }
    .quota-bar { width: 60px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .quota-fill { height: 100%; border-radius: 3px; transition: width .4s; }


    /* Content area */
    .content { flex: 1; padding: 28px 32px; }

    /* Vertical header banner */
    .v-banner { border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; border: 1px solid; }
    .v-banner-left { display: flex; align-items: center; gap: 14px; }
    .v-banner-icon { font-size: 2rem; }
    .v-banner-title { font-size: 1.1rem; font-weight: 700; }
    .v-banner-sub   { font-size: .82rem; margin-top: 2px; opacity: .8; }
    .v-banner-right { text-align: right; }
    .v-banner-quota { font-size: .8rem; opacity: .8; }
    .v-banner-bar   { width: 120px; height: 5px; background: rgba(255,255,255,.15); border-radius: 3px; overflow: hidden; margin-top: 6px; margin-left: auto; }
    .v-banner-fill  { height: 100%; background: rgba(255,255,255,.7); border-radius: 3px; transition: width .4s; }

    /* Tools grid */
    .tools-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .tools-header h2 { font-size: 1rem; font-weight: 600; }
    .filter-row { display: flex; gap: 8px; }
    .filter-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: .78rem; cursor: pointer; transition: all .15s; }
    .filter-btn.active, .filter-btn:hover { border-color: currentColor; }

    .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(220px, 100%), 1fr)); gap: 14px; }

    .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 8px; transition: border-color .18s, transform .18s; position: relative; }
    .tool-card:hover { transform: translateY(-2px); }
    .tool-card.accessible { cursor: pointer; }
    .tool-card.locked { opacity: .65; }
    .tool-card .tc-icon { font-size: 1.6rem; }
    .tool-card .tc-name { font-size: .9rem; font-weight: 600; }
    .tool-card .tc-desc { font-size: .8rem; color: var(--muted); line-height: 1.4; flex: 1; }
    .tool-card .tc-tier { display: inline-block; font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 8px; width: fit-content; }
    .tc-tier.starter { background: rgba(59,130,246,.13); color: #3b82f6; }
    .tc-tier.pro     { background: rgba(167,139,250,.13); color: #a78bfa; }
    .tc-tier.gold    { background: rgba(201,168,76,.13);  color: #c9a84c; }
    .tool-card .tc-action { margin-top: 4px; font-size: .82rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 5px; }
    .lock-overlay { position: absolute; top: 10px; right: 10px; font-size: 1rem; opacity: .6; }
    .upgrade-hint { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* Empty / no subscription */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .big { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .empty-state p { color: var(--muted); font-size: .9rem; line-height: 1.6; margin-bottom: 24px; }
    .btn-cta { display: inline-block; padding: 12px 28px; background: var(--accent); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: .95rem; transition: background .2s; }
    .btn-cta:hover { background: #5a52e0; }

    /* Welcome overlay */
    .welcome-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: rgba(15,17,23,.85); backdrop-filter: blur(8px); animation: welcomeFadeIn .4s ease; }
    @keyframes welcomeFadeIn { from { opacity: 0 } to { opacity: 1 } }
    .welcome-card { background: var(--surface, #1a1d27); border: 1px solid var(--border, #2a2d3a); border-radius: 20px; padding: 48px 40px 36px; max-width: 480px; width: 90%; text-align: center; position: relative; animation: welcomeSlideUp .5s ease; }
    @keyframes welcomeSlideUp { from { opacity: 0; transform: translateY(24px) } to { opacity: 1; transform: translateY(0) } }
    .welcome-card .wc-icon { font-size: 3rem; margin-bottom: 16px; }
    .welcome-card h2 { font-family: Georgia, 'DejaVu Serif', serif; font-size: 1.5rem; font-weight: 700; color: var(--cream, #f0ead8); margin-bottom: 10px; }
    .welcome-card p { color: var(--muted, #a0a0a0); font-size: .95rem; line-height: 1.6; margin-bottom: 24px; }
    .welcome-card .wc-tier { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: .8rem; font-weight: 700; margin-bottom: 20px; }
    .welcome-card .wc-cta { display: inline-block; padding: 12px 32px; background: var(--accent, #6c63ff); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: .95rem; cursor: pointer; border: none; transition: background .2s; }
    .welcome-card .wc-cta:hover { background: #5a52e0; }
    .welcome-card .wc-close { position: absolute; top: 14px; right: 18px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; }
    /* Welcome banner (fallback for returning first-login) */
    .welcome-banner { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); border-radius: 12px; padding: 14px 20px; margin-bottom: 22px; display: flex; align-items: center; gap: 12px; font-size: .875rem; }
    .welcome-banner button { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; }

    /* Skeleton */
    .skel { background: linear-gradient(90deg,var(--border) 25%,rgba(255,255,255,.04) 50%,var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Tier sections ── */
    .tier-section { margin-bottom: 28px; }
    .tier-section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .tier-section-label { font-size: .78rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    .tier-section-count { font-size: .75rem; color: var(--muted); }

    /* ── Tool card badges ── */
    .tc-badge {
      position: absolute; top: 10px; left: 10px;
      font-size: .6rem; font-weight: 700; padding: 2px 6px;
      border-radius: 4px; line-height: 1.4; pointer-events: none;
    }
    .tc-badge.featured { background: rgba(201,168,76,.14); color: #c9a84c; border: 1px solid rgba(201,168,76,.28); }
    /* Push icon down when badge is present so they don't overlap */
    .tool-card.has-badge .tc-icon { margin-top: 18px; }

    /* ── Announcement banner ── */
    .announce-bar {
      background: linear-gradient(90deg, #6c63ff 0%, #a78bfa 100%);
      color: #fff;
      text-align: center;
      padding: 10px 48px 10px 20px;
      font-size: .85rem;
      font-weight: 500;
      position: relative;
      letter-spacing: .01em;
      line-height: 1.4;
    }
    .announce-bar a { color: #fff; font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }
    .announce-bar a:hover { opacity: .85; }
    .announce-bar .announce-close {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,.7); font-size: 1.1rem;
      cursor: pointer; padding: 4px; line-height: 1; transition: color .15s;
    }
    .announce-bar .announce-close:hover { color: #fff; }

    /* ── Locked card redesign (no full-card opacity fade) ── */
    .tool-card.locked { opacity: 1; border-style: dashed; cursor: default; }
    .tool-card.locked:hover { transform: none; box-shadow: none; }
    .tool-card.locked .tc-icon,
    .tool-card.locked .tc-name,
    .tool-card.locked .tc-desc { opacity: .42; }
    .tc-upgrade {
      margin-top: auto; display: flex; align-items: center;
      justify-content: space-between; padding-top: 8px;
      border-top: 1px solid var(--border); font-size: .74rem; color: var(--muted);
    }
    .tc-upgrade-link {
      font-weight: 700; font-size: .74rem; text-decoration: none;
      white-space: nowrap; padding: 3px 8px; border-radius: 5px;
      border: 1px solid currentColor; transition: opacity .15s;
    }
    .tc-upgrade-link:hover { opacity: .75; }

    /* ── Filter buttons (functional) ── */
    .filter-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: .78rem; cursor: pointer; transition: all .15s; }
    .filter-btn.active { font-weight: 600; }
    .filter-btn:not(.active):hover { color: var(--text); border-color: var(--text); }

    /* ── Projects view ── */
    .proj-view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
    .proj-view-header h2 { font-size: 1.15rem; font-weight: 700; }
    .proj-filters { display: flex; gap: 8px; align-items: center; }
    .proj-filters select { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: .8rem; font-family: inherit; }
    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .proj-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; transition: all .18s; text-decoration: none; display: flex; flex-direction: column; gap: 8px; }
    .proj-card:hover { border-color: var(--accent2); transform: translateY(-2px); }
    .proj-card-head { display: flex; align-items: center; gap: 10px; }
    .proj-card-icon { font-size: 1.4rem; }
    .proj-card-name { font-size: .95rem; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proj-card-status { font-size: .65rem; font-weight: 700; padding: 2px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .proj-card-meta { font-size: .78rem; color: var(--muted); line-height: 1.4; }
    .proj-card-meta strong { color: var(--text); font-weight: 500; }
    .proj-card-date { font-size: .72rem; color: var(--muted); margin-top: auto; }
    .proj-card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .proj-card-tag { font-size: .68rem; padding: 2px 6px; border-radius: 6px; background: rgba(108,99,255,.1); color: var(--accent2); }
    .new-proj-card { border-style: dashed; align-items: center; justify-content: center; min-height: 140px; }
    .new-proj-card:hover { border-color: var(--accent); background: rgba(108,99,255,.04); }
    .new-proj-plus { font-size: 2rem; color: var(--muted); margin-bottom: 4px; }
    .new-proj-label { font-size: .85rem; color: var(--muted); }

    /* ── Create project modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 440px; }
    .modal h3 { font-size: 1.05rem; margin-bottom: 16px; }
    .modal-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 14px; font-size: .9rem; font-family: inherit; margin-bottom: 12px; }
    .modal-input:focus { outline: none; border-color: var(--accent); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .modal-btn { padding: 8px 18px; border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer; border: none; }
    .modal-btn-primary { background: var(--accent); color: #fff; }
    .modal-btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); }

    /* ── Tablet ── */
    @media(max-width:900px) {
      .tools-grid { grid-template-columns: repeat(auto-fill,minmax(min(200px,100%),1fr)) !important; }
      .topbar { flex-direction: column; align-items: flex-start; gap: 10px; }
      .v-banner { flex-direction: column; gap: 12px; align-items: flex-start; }
      .v-banner-right { text-align: left; }
      .v-banner-bar { margin-left: 0; }
    }
    /* ── Mobile ── */
    @media(max-width:700px) {
      :root { --sidebar: 0px; }
      .sidebar { display: none; }
      .main { margin-left: 0; max-width: 100vw; }
      .topbar { padding: 16px; }
      .topbar h1 { font-size: 1.1rem; }
      .topbar-right { display: none; }
      .content { padding: 14px; }
      .tools-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
      .tool-card { padding: 14px; }
      .tc-name { font-size: .88rem; }
      .v-banner { padding: 14px 16px; border-radius: 10px; }
      .v-banner-icon { font-size: 1.5rem; }
      .v-banner-title { font-size: .95rem; }
      .welcome-banner { margin: 0 0 12px; padding: 12px; flex-direction: column; gap: 8px; text-align: center; font-size: .82rem; }
      .tools-header { flex-direction: column; gap: 10px; align-items: flex-start; }
      .filter-row { flex-wrap: wrap; }
    }
    /* ── Small mobile ── */
    @media(max-width:400px) {
      .content { padding: 10px; }
      .tool-card { padding: 12px; }
      .vtab-btn { font-size: .72rem; padding: 6px 10px; }
    }

    /* ── Feedback modals (shared with tool.css) ── */
    .fb-overlay { position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px; }
    .fb-modal { background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:540px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden; }
    .fb-modal.fb-modal-lg { max-width:640px; }
    .fb-modal-head { padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:.95rem;font-weight:700; }
    .fb-close { background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:4px; }
    .fb-close:hover { color:var(--text); }
    .fb-modal-body { padding:20px 22px;overflow-y:auto;flex:1; }
    .fb-modal-foot { padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end; }
    .fb-intro { font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:16px; }
    .fb-row { display:flex;gap:12px; }
    .fb-field { margin-bottom:12px;flex:1; }
    .fb-field.fb-half { flex:1;min-width:0; }
    .fb-field label { display:block;font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:4px; }
    .fb-field input,.fb-field textarea,.fb-field select { width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:.85rem;font-family:inherit; }
    .fb-field input:focus,.fb-field textarea:focus,.fb-field select:focus { outline:none;border-color:var(--accent); }
    .fb-field textarea { resize:vertical;min-height:50px; }
    .fb-context-info { font-size:.72rem;color:var(--muted);background:rgba(108,99,255,.06);border:1px solid rgba(108,99,255,.15);border-radius:8px;padding:8px 12px;margin-top:4px; }
    .fb-btn { padding:8px 18px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:none; }
    .fb-btn.fb-btn-submit { background:var(--accent);color:#fff; }
    .fb-btn.fb-btn-submit:hover { opacity:.88; }
    .fb-btn.fb-btn-submit:disabled { opacity:.5;cursor:not-allowed; }
    .fb-btn.fb-btn-cancel { background:none;border:1px solid var(--border);color:var(--muted); }
    @media(max-width:600px) { .fb-row{flex-direction:column;gap:0;} .fb-modal{max-width:100%;} }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo"><a href="/index.html">The <span>Prompt</span> Studio</a></div>
  <nav class="sb-nav">
    <div class="nav-section" id="nav-my-workspaces">My workspaces</div>
    <div id="sidebar-verticals">
      <div class="nav-item" style="color:var(--muted);font-size:.82rem;padding-left:18px;" id="sidebar-loading">Loading…</div>
    </div>
    <div class="nav-section" style="margin-top:8px;" id="nav-navigation">Navigation</div>
    <a href="/dashboard.html?view=projects" class="nav-item" id="nav-projects">
      <span class="ico">📁</span> <span id="nav-proj-label">My projects</span>
      <span id="proj-lock-badge" style="margin-left:auto;font-size:.6rem;color:var(--muted);display:none">🔒</span>
      <span id="proj-count-badge" style="margin-left:auto;font-size:.7rem;background:rgba(108,99,255,.15);color:var(--accent2);padding:1px 6px;border-radius:8px;display:none"></span>
    </a>
    <a href="/account.html" class="nav-item"><span class="ico">👤</span> <span id="nav-account">My account</span></a>
    <a href="/account.html#cancel" class="nav-item" id="nav-cancel-sub" style="display:none;color:var(--danger);"><span class="ico">✕</span> <span id="nav-cancel-label">Cancel subscription</span></a>
    <div class="nav-section" style="margin-top:8px;" id="nav-feedback-label">Feedback</div>
    <a href="#" class="nav-item" onclick="event.preventDefault(); PSFeedback.showBugModal()"><span class="ico">🐛</span> <span id="nav-report-bug">Report a bug</span></a>
  </nav>
  <div class="sb-footer">
    <div class="sb-email" id="sb-email"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <button class="logout-btn" id="nav-logout" onclick="PS.logout()">↩ Log out</button>
      <a href="/pricing.html" style="font-size:.7rem;color:var(--muted);text-decoration:none;opacity:.6;transition:opacity .15s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'" id="nav-add-vertical">+ Vertical</a>
    </div>
  </div>
</aside>

<div class="main">
  <div class="announce-bar" id="announce-bar"></div>
  <div class="topbar">
    <div class="topbar-left">
      <h1 id="topbar-title">My workspace</h1>
      <p id="topbar-sub">Loading…</p>
    </div>
    <div class="topbar-right">
      <div class="quota-pill" id="quota-pill" style="display:none">
        <span id="quota-text">— / —</span>
        <div class="quota-bar"><div class="quota-fill" id="quota-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <!-- Skeleton placeholder — replaced by JS on load -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;">
      <div class="skel" style="height:140px;border-radius:12px;background:var(--surface,#1a1d27);"></div>
      <div class="skel" style="height:140px;border-radius:12px;background:var(--surface,#1a1d27);"></div>
      <div class="skel" style="height:140px;border-radius:12px;background:var(--surface,#1a1d27);"></div>
      <div class="skel" style="height:140px;border-radius:12px;background:var(--surface,#1a1d27);"></div>
      <div class="skel" style="height:140px;border-radius:12px;background:var(--surface,#1a1d27);"></div>
      <div class="skel" style="height:140px;border-radius:12px;background:var(--surface,#1a1d27);"></div>
    </div>
  </div>
</div>

<script>
let VMETA;
const TIER_LABELS = { starter:'🚀 Starter', pro:'⚡ Pro', gold:'👑 Gold', team:'🏢 Team' };
const QUOTA_MAX   = { starter:50, pro:150, gold:Infinity, team:Infinity };

// Tools loaded from DB via ToolCatalog (replaces old hardcoded ALL_TOOLS)
let ALL_TOOLS = {};
let _RAW_TOOLS = {}; // TOOLS_I18N multilingual objects (for language resolution)
let _CATALOG_TOOLS = null; // DB/cache tools with slug + featured (for merging)

/** Resolve tools for current language from TOOLS_I18N and merge DB metadata */
function resolveAllTools(lang) {
  if (!Object.keys(_RAW_TOOLS).length) return;
  ALL_TOOLS = ToolCatalog.resolveLanguage(_RAW_TOOLS, lang);
  // Merge slug + featured from DB/cache catalog
  if (_CATALOG_TOOLS) {
    Object.entries(_CATALOG_TOOLS).forEach(([v, list]) => {
      if (!ALL_TOOLS[v]) return;
      list.forEach(dbT => {
        const match = ALL_TOOLS[v].find(t => t.icon === dbT.icon && t.tier === dbT.tier);
        if (match) {
          match.slug     = dbT.slug || match.slug || '';
          match.featured = dbT.featured || false;
        }
      });
    });
  }
}

let activeV      = null;
let usageCount   = 0;
let activeFilter = 'all'; // 'all' | 'accessible' | 'locked'

const TIER_META = {
  starter: { label: '🚀 Starter', color: '#3b82f6' },
  pro:     { label: '⚡ Pro',     color: '#a78bfa' },
  gold:    { label: '👑 Gold',    color: '#c9a84c' },
  team:    { label: '🏢 Team',    color: '#10b981' },
};

// ── Render sidebar verticals ───────────────────────────────────────────────
function renderSidebar() {
  const subs = PS.subs;
  const el   = document.getElementById('sidebar-verticals');
  if (!subs.length) { el.innerHTML = ''; return; }
  el.innerHTML = subs.map(s => {
    const m = VMETA[s.vertical] || {};
    const vLabel = T('verticals.' + s.vertical) || m.label || s.vertical;
    return `<button class="nav-item" data-v="${s.vertical}" onclick="switchVertical('${s.vertical}')"
              style="--vc:${m.color||'#6c63ff'}">
      <span class="ico">${m.icon||'📁'}</span>
      <span>${vLabel}</span>
      <span style="margin-left:auto;font-size:.68rem;opacity:.6">${TIER_LABELS[s.tier]?.replace(/[^a-zA-Z]/g,'')||s.tier}</span>
    </button>`;
  }).join('');
}

// ── Switch vertical ────────────────────────────────────────────────────────
async function switchVertical(v) {
  activeV      = v;
  activeFilter = 'all';
  const sub = PS.subForVertical(v);
  const m   = VMETA[v] || {};
  const vc  = m.color || '#6c63ff';

  // Active states with dynamic color — sidebar nav only
  document.querySelectorAll('.nav-item[data-v]').forEach(b => {
    const isActive = b.dataset.v === v;
    b.classList.toggle('active', isActive);
    if (isActive) { b.style.background = m.bg || ''; b.style.color = vc; }
    else          { b.style.background = ''; b.style.color = ''; }
  });

  const vLabel = T('verticals.' + v) || m.label || v;
  document.getElementById('topbar-title').textContent = `${m.icon || ''} ${vLabel}`;
  // Show trial badge if on_trial
  const isOnTrial = sub?.status === 'on_trial';
  const trialEnd  = sub?.trial_ends_at ? new Date(sub.trial_ends_at) : null;
  const trialDays = trialEnd ? Math.max(0, Math.ceil((trialEnd - Date.now()) / 86400000)) : 0;
  const trialTag  = isOnTrial ? ` · <span style="color:#22c55e;font-weight:600">${TH('dashboard.free_trial_days', { d: trialDays })}</span>` : '';
  document.getElementById('topbar-sub').innerHTML = sub ? `${TIER_LABELS[sub.tier]} · ${vLabel} ${TH('dashboard.tools_access')}${trialTag}` : '';

  /* ── Dynamic theming: sidebar logo, topbar border ── */
  const logoSpan = document.querySelector('.sb-logo span');
  if (logoSpan) logoSpan.style.color = vc;
  const topbar = document.querySelector('.topbar');
  if (topbar) topbar.style.borderBottomColor = vc;

  await updateQuota(v, sub);
  renderTools(v, sub, 'all');
}

// ── Set filter and re-render ───────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  renderTools(activeV, PS.subForVertical(activeV), f);
}

// ── Update quota display ───────────────────────────────────────────────────
async function updateQuota(v, sub) {
  if (!sub) return;
  const count = await PS.getMonthlyUsage(v);
  usageCount  = count;
  const max   = QUOTA_MAX[sub.tier] ?? 50;
  const pct   = max === Infinity ? 5 : Math.min(100, Math.round(count/max*100));
  const color = VMETA[v]?.color || '#6c63ff';
  const pill  = document.getElementById('quota-pill');
  pill.style.display = 'flex';
  document.getElementById('quota-text').textContent = max === Infinity ? `${count} ${T('dashboard.generated')}` : `${count} / ${max}`;
  const fill = document.getElementById('quota-fill');
  fill.style.width      = pct + '%';
  fill.style.background = pct > 80 ? '#ef4444' : color;
}

// ── Build accessible tool card HTML ───────────────────────────────────────
function accessibleCard(t, color, v) {
  const hasBadge = t.featured;
  const badge    = t.featured
    ? `<span class="tc-badge featured">⭐ ${T('dashboard.popular')}</span>` : '';
  return `
    <div class="tool-card accessible${hasBadge?' has-badge':''}"
         style="border-color:transparent"
         onmouseover="this.style.borderColor='${color}'"
         onmouseout="this.style.borderColor='transparent'"
         onclick="window.location.href='${ToolCatalog.toolUrl(t.slug)}'">
      ${badge}
      <span class="tc-icon">${t.icon}</span>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}</div>
      <a href="${ToolCatalog.toolUrl(t.slug)}" class="tc-action" style="color:${color}">${T('dashboard.use_tool')} →</a>
    </div>`;
}

// ── Build locked tool card HTML ────────────────────────────────────────────
function lockedCard(t, color, v) {
  const hasBadge  = t.featured;
  const badge     = t.featured
    ? `<span class="tc-badge featured">⭐ ${T('dashboard.popular')}</span>` : '';
  const reason = t._access?.reason === 'upgrade_required'
    ? `${T('dashboard.available_in')} ${TIER_LABELS[t._access.required]}`
    : T('dashboard.sub_required');
  return `
    <div class="tool-card locked${hasBadge?' has-badge':''}">
      <span class="lock-overlay">🔒</span>
      ${badge}
      <span class="tc-icon">${t.icon}</span>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}</div>
      <div class="tc-upgrade">
        <span>${reason}</span>
        <a href="/pricing.html?v=${v}" class="tc-upgrade-link" style="color:${color}">Upgrade →</a>
      </div>
    </div>`;
}

// ── Render tools for a vertical ────────────────────────────────────────────
function renderTools(v, sub, filter = 'all') {
  const content = document.getElementById('content');
  const tools   = ALL_TOOLS[v] || [];
  const m       = VMETA[v] || {};
  const color   = m.color || '#6c63ff';
  const max     = sub ? (QUOTA_MAX[sub.tier] ?? 50) : 0;
  const pct     = max === Infinity ? 5 : Math.min(100, Math.round(usageCount/max*100));

  // Annotate each tool with its access result
  const annotated = tools.map(t => ({ ...t, _access: PS.canUseTool(t.slug, t.tier, v) }));
  const accessible = annotated.filter(t => t._access.allowed);
  const locked     = annotated.filter(t => !t._access.allowed);

  // Apply filter
  const visible = filter === 'accessible' ? accessible
                : filter === 'locked'     ? locked
                : annotated;

  // Group visible tools by tier; within each tier: featured first, then alphabetical
  const byTier = { starter: [], pro: [], gold: [] };
  visible.forEach(t => { (byTier[t.tier] = byTier[t.tier] || []).push(t); });
  Object.values(byTier).forEach(g => g.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0)));

  // Banner
  const bannerStyle = `background:${m.bg||'rgba(108,99,255,.1)'};border-color:${m.border||'rgba(108,99,255,.3)'};color:${color}`;
  let html = `
    <div class="v-banner" style="${bannerStyle}">
      <div class="v-banner-left">
        <span class="v-banner-icon">${m.icon||'📁'}</span>
        <div>
          <div class="v-banner-title">${T('verticals.' + v) || m.label || v}</div>
          <div class="v-banner-sub">${sub ? TIER_LABELS[sub.tier] + ' · ' + (max===Infinity?TH('common.unlimited'):max+' '+TH('dashboard.gen_per_month')) : TH('dashboard.no_sub')}</div>
        </div>
      </div>
      <div class="v-banner-right">
        <div class="v-banner-quota">${max===Infinity ? usageCount+' '+TH('dashboard.used') : 'Quota: '+usageCount+' / '+max}</div>
        <div class="v-banner-bar"><div class="v-banner-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;

  // Header: accessible count + filter buttons
  const filters = [
    { key:'all',        label:`${T('dashboard.filter_all')} (${tools.length})` },
    { key:'accessible', label:`${T('dashboard.filter_available')} (${accessible.length})` },
    { key:'locked',     label:`${T('dashboard.filter_locked')} (${locked.length})` },
  ];
  html += `<div class="tools-header">
    <h2>
      <span style="color:${color}">${accessible.length}</span>
      <span style="color:var(--muted);font-weight:400"> / ${tools.length} ${T('dashboard.available')}</span>
    </h2>
    <div class="filter-row">
      ${filters.map(f => `
        <button class="filter-btn${filter===f.key?' active':''}"
                style="${filter===f.key?'color:'+color+';border-color:'+color:''}"
                onclick="setFilter('${f.key}')">${f.label}</button>`).join('')}
    </div>
  </div>`;

  // ── "Suggest a tool" special card — always first ──
  html += `<div class="tools-grid" style="margin-bottom:20px">
    <div class="tool-card accessible suggest-tool-card" style="border-style:dashed;border-color:rgba(108,99,255,.3);cursor:pointer;background:rgba(108,99,255,.03)"
         onclick="PSFeedback.showSuggestModal({ vertical: '${v}' })">
      <div class="tc-icon" style="font-size:2rem">💡</div>
      <div class="tc-name" style="color:var(--accent2)">${TH('dashboard.suggest_tool')}</div>
      <div class="tc-desc">${TH('dashboard.suggest_tool_desc')}</div>
      <div class="tc-action" style="color:var(--accent2)">${TH('dashboard.suggest_idea')} →</div>
    </div>
  </div>`;

  // Ad slot (Starter only, between suggest card and tools)
  html += '<div id="ad-slot-dashboard" data-ad-slot="banner"></div>';

  // Tier sections
  let hasContent = false;
  ['starter','pro','gold'].forEach(tier => {
    const group = byTier[tier];
    if (!group || !group.length) return;
    hasContent = true;
    const tc           = TIER_META[tier];
    const tierAccCount = group.filter(t => t._access.allowed).length;
    const countLabel   = filter === 'all'
      ? `${tierAccCount} / ${group.length} ${T('dashboard.available')}`
      : `${group.length} ${group.length > 1 ? T('dashboard.tools') : T('dashboard.tool')}`;

    html += `<div class="tier-section">
      <div class="tier-section-header">
        <span class="tier-section-label" style="color:${tc.color}">${tc.label}</span>
        <span class="tier-section-count">${countLabel}</span>
      </div>
      <div class="tools-grid">`;

    group.forEach(t => {
      html += t._access.allowed ? accessibleCard(t, color, v) : lockedCard(t, color, v);
    });

    html += `</div></div>`;
  });

  // Empty state for filter with no results
  if (!hasContent) {
    html += `<div style="text-align:center;padding:48px 20px;color:var(--muted);font-size:.9rem;">
      ${TH('dashboard.no_tools_cat')}
      <button onclick="setFilter('all')" style="margin-left:8px;background:none;border:none;color:${color};cursor:pointer;font-weight:600;font-size:.9rem;">${TH('dashboard.view_all')} →</button>
    </div>`;
  }

  content.innerHTML = html;
}

// ── No subscription state ──────────────────────────────────────────────────
function renderNoSub() {
  document.getElementById('topbar-title').textContent = T('dashboard.title');
  document.getElementById('topbar-sub').textContent   = T('dashboard.no_sub');
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="big">🚀</div>
      <h2>${TH('dashboard.choose_vertical')}</h2>
      <p>${TH('dashboard.choose_vertical_desc')}</p>
      <a href="/pricing.html" class="btn-cta">${TH('common.view_plans')} →</a>
    </div>`;
}

// ── Welcome experience ──────────────────────────────────────────────────────
function maybeShowWelcome() {
  const params = new URLSearchParams(window.location.search);
  const fromCheckout = params.has('welcome');          // ?welcome=1 from Lemon Squeezy
  const SEEN_KEY = 'ps_welcome_seen';
  const firstEverLogin = !localStorage.getItem(SEEN_KEY);

  if (!fromCheckout && !firstEverLogin) return;

  // Mark as seen
  try { localStorage.setItem(SEEN_KEY, '1'); } catch (e) {}

  // Clean URL if coming from checkout redirect
  if (fromCheckout) {
    params.delete('welcome');
    const clean = params.toString();
    window.history.replaceState({}, '', '/dashboard.html' + (clean ? '?' + clean : ''));
  }

  // Detect active vertical & subscription info
  const sub = PS.subs && PS.subs[0];
  const v   = activeV || sub?.vertical;
  const m   = v ? VMETA[v] : null;
  const tierLabel = sub ? (TIER_LABELS[sub.tier] || sub.tier) : '';

  const isOnTrial = sub?.status === 'on_trial';
  const trialEnd  = sub?.trial_ends_at ? new Date(sub.trial_ends_at) : null;
  const trialDays = trialEnd ? Math.max(0, Math.ceil((trialEnd - Date.now()) / 86400000)) : 0;

  // Build welcome overlay
  const overlay = document.createElement('div');
  overlay.className = 'welcome-overlay';
  const verticalColor = m?.color || '#6c63ff';

  let subtitle = '';
  if (fromCheckout && isOnTrial) {
    subtitle = TH('dashboard.welcome_trial', { tier: tierLabel });
  } else if (fromCheckout) {
    subtitle = TH('dashboard.welcome_active', { tier: tierLabel });
  } else {
    subtitle = TH('dashboard.welcome_first');
  }

  let trialNote = '';
  if (isOnTrial) {
    trialNote = `<div class="wc-tier" style="background:rgba(34,197,94,.12);color:#22c55e;">${TH('dashboard.welcome_trial_badge', { d: trialDays })}</div><br>`;
  }

  overlay.innerHTML = `
    <div class="welcome-card">
      <button class="wc-close" onclick="this.closest('.welcome-overlay').remove()" aria-label="Close">&times;</button>
      <div class="wc-icon">${m?.icon || '🎉'}</div>
      <h2>${TH('dashboard.welcome_to')} ${v ? (T('verticals.' + v) || m?.label || v) : 'The Prompt Studio'}!</h2>
      ${trialNote}
      <p>${subtitle}</p>
      <button class="wc-cta" onclick="this.closest('.welcome-overlay').remove()">${TH('dashboard.welcome_cta')} &rarr;</button>
    </div>
  `;

  document.body.appendChild(overlay);

  // Close on backdrop click
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.remove();
  });

  // Close on Escape
  function onEsc(e) { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onEsc); } }
  document.addEventListener('keydown', onEsc);
}

// ══════════════════════════════════════════════════════════════════════════════
// PROJECT VIEW
// ══════════════════════════════════════════════════════════════════════════════
let _projFilterVertical = '';
let _projFilterStatus   = 'active';

async function renderProjectsView() {
  // ── Feature gate: CRM requires Gold+ ──
  const crmAccess = PS.canAccessFeature('crm_projects');
  if (!crmAccess.allowed) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navProj = document.getElementById('nav-projects');
    if (navProj) navProj.classList.add('active');
    document.getElementById('topbar-title').textContent = '📁 ' + T('dashboard.projects_title');
    document.getElementById('topbar-sub').textContent   = '';
      document.getElementById('quota-pill').style.display = 'none';
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="big">🔒</div>
        <h2>${TH('dashboard.crm_title')}</h2>
        <p>${TH('dashboard.crm_locked')}</p>
        <a href="/pricing.html" class="btn-cta">${TH('dashboard.upgrade_gold')} →</a>
      </div>`;
    return;
  }

  const params = new URLSearchParams(location.search);
  _projFilterVertical = params.get('pv') || '';
  _projFilterStatus   = params.get('ps') || 'active';

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navProj = document.getElementById('nav-projects');
  if (navProj) navProj.classList.add('active');

  // Header
  document.getElementById('topbar-title').textContent = '📁 ' + T('dashboard.projects_title');
  document.getElementById('topbar-sub').textContent   = T('dashboard.projects_sub');
  document.getElementById('quota-pill').style.display = 'none';

  const projects = await PSProjects.list({
    vertical: _projFilterVertical || undefined,
    status:   _projFilterStatus   || undefined,
    limit: 100
  });

  // Build vertical options for filter
  const subVerticals = PS.subs.map(s => s.vertical);
  const vOpts = subVerticals.map(v => {
    const m = VMETA[v] || {};
    return `<option value="${v}" ${v === _projFilterVertical ? 'selected' : ''}>${m.icon || ''} ${T('verticals.' + v) || m.label || v}</option>`;
  }).join('');

  let html = `
    <div class="proj-view-header">
      <h2>📁 ${projects.length} ${projects.length > 1 ? T('dashboard.projects_title') : T('dashboard.projects_title')}</h2>
      <div class="proj-filters">
        <select onchange="filterProjects(this.value, '${_projFilterStatus}')">
          <option value="">${T('dashboard.all_verticals')}</option>
          ${vOpts}
        </select>
        <select onchange="filterProjects('${_projFilterVertical}', this.value)">
          <option value="active"    ${_projFilterStatus==='active'?'selected':''}>${T('dashboard.active')}</option>
          <option value="completed" ${_projFilterStatus==='completed'?'selected':''}>${T('dashboard.completed')}</option>
          <option value="archived"  ${_projFilterStatus==='archived'?'selected':''}>${T('dashboard.archived')}</option>
          <option value=""           ${!_projFilterStatus?'selected':''}>${T('dashboard.all')}</option>
        </select>
      </div>
    </div>
    <div class="proj-grid">`;

  // New project card
  html += `
    <div class="proj-card new-proj-card" onclick="showCreateProjectModal()">
      <div class="new-proj-plus">+</div>
      <div class="new-proj-label">${T('dashboard.new_project')}</div>
    </div>`;

  // Project cards
  projects.forEach(p => {
    const m    = VMETA[p.vertical] || {};
    const sm   = PSProjects.STATUS_META[p.status] || {};
    const _lang = PS_I18N.lang();
    const _loc = _lang==='fr'?'fr-FR':_lang==='es'?'es-ES':_lang==='pt'?'pt-BR':_lang==='ar'?'ar-SA':'en-GB';
    const date = new Date(p.updated_at).toLocaleDateString(_loc, { day:'numeric', month:'short' });

    // Extract key data preview
    const dataEntries = Object.entries(p.data || {}).filter(([,v]) => v).slice(0, 3);
    const preview = dataEntries.map(([k,v]) => `<strong>${PSProjects.escapeHtml(k)}</strong>: ${PSProjects.escapeHtml(String(v).slice(0,40))}`).join(' · ');

    html += `
      <a href="/project.html?id=${p.id}" class="proj-card" style="border-color:${m.border || 'var(--border)'}">
        <div class="proj-card-head">
          <span class="proj-card-icon">${m.icon || '📁'}</span>
          <span class="proj-card-name">${PSProjects.escapeHtml(p.name)}</span>
          <span class="proj-card-status" style="background:${sm.color}22;color:${sm.color}">${sm.label || p.status}</span>
        </div>
        <div class="proj-card-meta">${preview || '<em style="opacity:.5">' + TH('dashboard.no_info') + '</em>'}</div>
        <div class="proj-card-tags">
          <span class="proj-card-tag" style="background:${m.bg || 'rgba(108,99,255,.1)'};color:${m.color || 'var(--accent2)'}">${T('verticals.' + p.vertical) || m.label || p.vertical}</span>
        </div>
        <div class="proj-card-date">${T('dashboard.updated')} ${date}</div>
      </a>`;
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function filterProjects(vertical, status) {
  const params = new URLSearchParams();
  params.set('view', 'projects');
  if (vertical) params.set('pv', vertical);
  if (status)   params.set('ps', status);
  history.replaceState({}, '', '/dashboard.html?' + params.toString());
  renderProjectsView();
}

function showCreateProjectModal() {
  const subVerticals = PS.subs.map(s => s.vertical);
  const vOpts = subVerticals.map(v => {
    const m = VMETA[v] || {};
    return `<option value="${v}">${m.icon || ''} ${T('verticals.' + v) || m.label || v}</option>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal">
      <h3>📁 ${T('dashboard.new_project')}</h3>
      <input type="text" class="modal-input" id="new-proj-name" placeholder="${T('dashboard.project_name_ph')}" autofocus/>
      <select class="modal-input" id="new-proj-vertical">${vOpts}</select>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-cancel" onclick="this.closest('.modal-overlay').remove()">${T('common.cancel')}</button>
        <button class="modal-btn modal-btn-primary" onclick="createProject()">${T('common.create')} →</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('new-proj-name')?.focus(), 50);
}

async function createProject() {
  const name     = document.getElementById('new-proj-name')?.value?.trim();
  const vertical = document.getElementById('new-proj-vertical')?.value;
  if (!name) { alert(T('dashboard.err_project_name')); return; }
  if (!vertical) { alert(T('dashboard.err_project_vert')); return; }

  const proj = await PSProjects.create({ vertical, name });
  document.querySelector('.modal-overlay')?.remove();
  if (proj) {
    location.href = `/project.html?id=${proj.id}`;
  } else {
    alert(T('dashboard.err_project_create'));
  }
}

// ── Project count badge in sidebar ───────────────────────────────────────────
async function updateProjectBadge() {
  const crmAccess = PS.canAccessFeature('crm_projects');
  const lockBadge = document.getElementById('proj-lock-badge');
  const countBadge = document.getElementById('proj-count-badge');

  if (!crmAccess.allowed) {
    // Show lock, hide count
    if (lockBadge) lockBadge.style.display = 'inline';
    if (countBadge) countBadge.style.display = 'none';
    return;
  }

  // Hide lock
  if (lockBadge) lockBadge.style.display = 'none';

  try {
    const counts = await PSProjects.countByVertical();
    const total  = Object.values(counts).reduce((s, n) => s + n, 0);
    if (countBadge && total > 0) {
      countBadge.textContent = total;
      countBadge.style.display = 'inline';
    }
  } catch (e) {}
}

// ── Render announcement bar ───────────────────────────────────────────────
function renderAnnounceBar() {
  const bar = document.getElementById('announce-bar');
  if (!bar) return;
  bar.innerHTML = `📱 ${TH('dashboard.announce')}
    <button class="announce-close" onclick="document.getElementById('announce-bar').style.display='none'; try{localStorage.setItem('ps_announce_dismissed','1')}catch(e){}" aria-label="Close">✕</button>`;
}

// ── Update UI text when language changes ─────────────────────────────────────
function updateUIText() {
  document.getElementById('nav-my-workspaces').textContent = T('nav.my_workspaces');
  document.getElementById('sidebar-loading').textContent = T('common.loading');
  document.getElementById('nav-navigation').textContent = T('nav.navigation');
  document.getElementById('nav-proj-label').textContent = T('nav.my_projects');
  document.getElementById('nav-account').textContent = T('nav.my_account');
  // Show cancel link only if user has active subscriptions
  const cancelLink = document.getElementById('nav-cancel-sub');
  if (cancelLink) {
    const hasActive = PS.hasAnySubscription();
    cancelLink.style.display = hasActive ? '' : 'none';
    const cancelLabels = {fr:'Résilier mon abonnement',en:'Cancel subscription',es:'Cancelar suscripción',pt:'Cancelar assinatura',ar:'إلغاء الاشتراك'};
    document.getElementById('nav-cancel-label').textContent = cancelLabels[PS_I18N.lang()] || cancelLabels.en;
  }
  document.getElementById('nav-feedback-label').textContent = T('nav.feedback');
  document.getElementById('nav-report-bug').textContent = T('nav.report_bug');
  document.getElementById('nav-logout').textContent = '↩ ' + T('nav.log_out');
  document.getElementById('nav-add-vertical').textContent = '+ ' + T('nav.vertical');
  document.title = T('dashboard.page_title');
  renderAnnounceBar();
  // Re-resolve tool translations for new language (with slug merge)
  resolveAllTools(PS_I18N.lang());
  // Re-render sidebar with translated vertical names
  renderSidebar();
  // Re-render current view if loaded
  const view = new URLSearchParams(location.search).get('view');
  if (view === 'projects' && PS.hasAnySubscription()) {
    renderProjectsView();
  } else if (activeV) {
    switchVertical(activeV);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  const ok = await PS.requireAuth('/dashboard.html');
  if (!ok) return;
  VMETA = PS.VERTICALS;

  document.getElementById('sb-email').textContent = PS.session.user.email;

  // ── Sync user's preferred language from DB ──
  try {
    const { data: profile } = await PS.supabase
      .from('profiles')
      .select('preferred_lang')
      .eq('id', PS.session.user.id)
      .single();
    if (profile?.preferred_lang && typeof setLang === 'function') {
      setLang(profile.preferred_lang);
    }
  } catch (e) { /* ignore — use localStorage fallback */ }

  // Set up language change handler
  PS_I18N.onChange(updateUIText);
  updateUIText();

  // Profile completion banner
  if (!PS.isProfileComplete()) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.3);border-radius:12px;padding:14px 20px;margin:0 0 20px;display:flex;align-items:center;justify-content:space-between;font-size:.875rem;';
    banner.innerHTML = '<span>👋 ' + TH('dashboard.complete_profile') + '</span><a href="/complete-profile.html?redirect=/dashboard.html" style="background:#6c63ff;color:#fff;padding:6px 16px;border-radius:7px;text-decoration:none;font-weight:600;font-size:.8rem;white-space:nowrap;margin-left:12px;">' + T('dashboard.complete_btn') + ' →</a>';
    const main = document.querySelector('.content');
    if (main) main.prepend(banner);
  }

  // Check if projects view is requested
  const view = new URLSearchParams(location.search).get('view');

  if (!PS.hasAnySubscription()) {
    renderNoSub();
    return;
  }

  // Load tools — always use TOOLS_I18N as the translation source (multilingual objects),
  // then merge DB-specific data (slug, featured) from catalog on top.
  const catalog = await ToolCatalog.load();
  _CATALOG_TOOLS = catalog.tools || null;
  if (typeof TOOLS_I18N !== 'undefined') {
    _RAW_TOOLS = TOOLS_I18N; // always multilingual objects
  } else if (catalog.tools) {
    _RAW_TOOLS = catalog.tools;
  }
  resolveAllTools(PS_I18N.lang());

  renderSidebar();
  updateProjectBadge();

  if (view === 'projects') {
    await renderProjectsView();
  } else {
    const urlV  = new URLSearchParams(location.search).get('v');
    const firstV = (urlV && PS.subForVertical(urlV)) ? urlV : PS.subs[0]?.vertical;
    await switchVertical(firstV);
    maybeShowWelcome();

    // Show welcome interstitial ad (Starter only, once per session)
    if (typeof PSAds !== 'undefined') {
      setTimeout(function() { PSAds.showWelcomeInterstitial(); }, 1000);
    }
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
