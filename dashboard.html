<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon espace – The Prompt Studio</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" href="/assets/images/favicon.ico"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/ps-auth.js"></script>
  <script src="/js/tool-catalog.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3e;
      --text:    #e8eaf0;
      --muted:   #7c8098;
      --accent:  #6c63ff;
      --accent2: #a78bfa;
      --sidebar: 240px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top:0; left:0; bottom:0; z-index: 50; }
    .sb-logo { padding: 22px 20px; border-bottom: 1px solid var(--border); }
    .sb-logo a { text-decoration: none; font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .sb-logo span { color: var(--accent2); }
    .sb-nav { flex: 1; padding: 14px 0; overflow-y: auto; }
    .nav-section { padding: 10px 18px 4px; font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 18px; color: var(--muted); text-decoration: none; font-size: .875rem; transition: background .14s, color .14s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: rgba(108,99,255,.07); color: var(--text); }
    .nav-item.active { background: rgba(108,99,255,.14); color: var(--accent2); }
    .nav-item .ico { font-size: 1rem; width: 20px; text-align: center; }

    /* Vertical nav items — dynamic color from VERTICALS constant */
    .nav-item[data-v].active { font-weight: 600; }

    .sb-footer { padding: 14px 18px; border-top: 1px solid var(--border); }
    .sb-email { font-size: .73rem; color: var(--muted); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn { display: flex; align-items: center; gap: 7px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: .85rem; padding: 5px 0; transition: color .14s; }
    .logout-btn:hover { color: #ef4444; }

    /* ── Main ── */
    .main { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; }

    /* Top bar */
    .topbar { padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; }
    .topbar-left h1 { font-size: 1.2rem; font-weight: 700; }
    .topbar-left p  { font-size: .82rem; color: var(--muted); margin-top: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    /* Quota pill */
    .quota-pill { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: .8rem; }
    .quota-bar { width: 60px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .quota-fill { height: 100%; border-radius: 3px; transition: width .4s; }

    /* Vertical tab bar */
    .vtab-bar { display: flex; align-items: center; gap: 2px; padding: 0 32px; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; }
    .vtab-btn { display: flex; align-items: center; gap: 7px; padding: 13px 20px; font-size: .875rem; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; transition: all .18s; white-space: nowrap; }
    .vtab-btn:hover { color: var(--text); }
    .vtab-btn.active { font-weight: 600; }
    .vtab-btn[data-v].active { font-weight: 600; }
    .vtab-btn .tier-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tier-dot.bronze { background: #cd7f32; }
    .tier-dot.silver { background: #a8a9ad; }
    .tier-dot.gold   { background: #c9a84c; }

    /* Content area */
    .content { flex: 1; padding: 28px 32px; }

    /* Vertical header banner */
    .v-banner { border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; border: 1px solid; }
    .v-banner-left { display: flex; align-items: center; gap: 14px; }
    .v-banner-icon { font-size: 2rem; }
    .v-banner-title { font-size: 1.1rem; font-weight: 700; }
    .v-banner-sub   { font-size: .82rem; margin-top: 2px; opacity: .8; }
    .v-banner-right { text-align: right; }
    .v-banner-quota { font-size: .8rem; opacity: .8; }
    .v-banner-bar   { width: 120px; height: 5px; background: rgba(255,255,255,.15); border-radius: 3px; overflow: hidden; margin-top: 6px; margin-left: auto; }
    .v-banner-fill  { height: 100%; background: rgba(255,255,255,.7); border-radius: 3px; transition: width .4s; }

    /* Tools grid */
    .tools-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .tools-header h2 { font-size: 1rem; font-weight: 600; }
    .filter-row { display: flex; gap: 8px; }
    .filter-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: .78rem; cursor: pointer; transition: all .15s; }
    .filter-btn.active, .filter-btn:hover { border-color: currentColor; }

    .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }

    .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 8px; transition: border-color .18s, transform .18s; position: relative; }
    .tool-card:hover { transform: translateY(-2px); }
    .tool-card.accessible { cursor: pointer; }
    .tool-card.locked { opacity: .65; }
    .tool-card .tc-icon { font-size: 1.6rem; }
    .tool-card .tc-name { font-size: .9rem; font-weight: 600; }
    .tool-card .tc-desc { font-size: .8rem; color: var(--muted); line-height: 1.4; flex: 1; }
    .tool-card .tc-tier { display: inline-block; font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 8px; width: fit-content; }
    .tc-tier.bronze { background: rgba(205,127,50,.13); color: #cd7f32; }
    .tc-tier.silver { background: rgba(168,169,173,.13); color: #a8a9ad; }
    .tc-tier.gold   { background: rgba(201,168,76,.13);  color: #c9a84c; }
    .tool-card .tc-action { margin-top: 4px; font-size: .82rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 5px; }
    .lock-overlay { position: absolute; top: 10px; right: 10px; font-size: 1rem; opacity: .6; }
    .upgrade-hint { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* Empty / no subscription */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .big { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .empty-state p { color: var(--muted); font-size: .9rem; line-height: 1.6; margin-bottom: 24px; }
    .btn-cta { display: inline-block; padding: 12px 28px; background: var(--accent); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: .95rem; transition: background .2s; }
    .btn-cta:hover { background: #5a52e0; }

    /* Welcome toast */
    .welcome-banner { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); border-radius: 12px; padding: 14px 20px; margin-bottom: 22px; display: flex; align-items: center; gap: 12px; font-size: .875rem; }
    .welcome-banner button { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; }

    /* Skeleton */
    .skel { background: linear-gradient(90deg,var(--border) 25%,rgba(255,255,255,.04) 50%,var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Tier sections ── */
    .tier-section { margin-bottom: 28px; }
    .tier-section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .tier-section-label { font-size: .78rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    .tier-section-count { font-size: .75rem; color: var(--muted); }

    /* ── Tool card badges ── */
    .tc-badge {
      position: absolute; top: 10px; left: 10px;
      font-size: .6rem; font-weight: 700; padding: 2px 6px;
      border-radius: 4px; line-height: 1.4; pointer-events: none;
    }
    .tc-badge.featured { background: rgba(201,168,76,.14); color: #c9a84c; border: 1px solid rgba(201,168,76,.28); }
    .tc-badge.new-tool { background: rgba(34,197,94,.12);  color: #22c55e; border: 1px solid rgba(34,197,94,.28); }
    /* Push icon down when badge is present so they don't overlap */
    .tool-card.has-badge .tc-icon { margin-top: 18px; }

    /* ── Locked card redesign (no full-card opacity fade) ── */
    .tool-card.locked { opacity: 1; border-style: dashed; cursor: default; }
    .tool-card.locked:hover { transform: none; box-shadow: none; }
    .tool-card.locked .tc-icon,
    .tool-card.locked .tc-name,
    .tool-card.locked .tc-desc { opacity: .42; }
    .tc-upgrade {
      margin-top: auto; display: flex; align-items: center;
      justify-content: space-between; padding-top: 8px;
      border-top: 1px solid var(--border); font-size: .74rem; color: var(--muted);
    }
    .tc-upgrade-link {
      font-weight: 700; font-size: .74rem; text-decoration: none;
      white-space: nowrap; padding: 3px 8px; border-radius: 5px;
      border: 1px solid currentColor; transition: opacity .15s;
    }
    .tc-upgrade-link:hover { opacity: .75; }

    /* ── Filter buttons (functional) ── */
    .filter-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: .78rem; cursor: pointer; transition: all .15s; }
    .filter-btn.active { font-weight: 600; }
    .filter-btn:not(.active):hover { color: var(--text); border-color: var(--text); }

    @media(max-width:700px) { .sidebar{display:none;} .main{margin-left:0;} .vtab-bar,.topbar,.content{padding-left:16px;padding-right:16px;} }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo"><a href="/index.html">The <span>Prompt</span> Studio</a></div>
  <nav class="sb-nav">
    <div class="nav-section">Mes espaces</div>
    <div id="sidebar-verticals">
      <div class="nav-item" style="color:var(--muted);font-size:.82rem;padding-left:18px;">Chargement…</div>
    </div>
    <div class="nav-section" style="margin-top:8px;">Navigation</div>
    <a href="/account.html" class="nav-item"><span class="ico">👤</span> Mon compte</a>
    <a href="/tarifs.html"  class="nav-item"><span class="ico">➕</span> Ajouter une verticale</a>
  </nav>
  <div class="sb-footer">
    <div class="sb-email" id="sb-email"></div>
    <button class="logout-btn" onclick="PS.logout()">↩ Déconnexion</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h1 id="topbar-title">Mon espace</h1>
      <p id="topbar-sub">Chargement…</p>
    </div>
    <div class="topbar-right">
      <div class="quota-pill" id="quota-pill" style="display:none">
        <span id="quota-text">— / —</span>
        <div class="quota-bar"><div class="quota-fill" id="quota-fill" style="width:0%"></div></div>
      </div>
      <a href="/tarifs.html" style="font-size:.8rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 12px;border-radius:7px;transition:all .15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">+ Verticale</a>
    </div>
  </div>

  <!-- Vertical tab bar -->
  <div class="vtab-bar" id="vtab-bar"></div>

  <div class="content" id="content">
    <!-- Filled by JS -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;">
      ${Array(6).fill('<div class="skel" style="height:140px;border-radius:12px;"></div>').join('')}
    </div>
  </div>
</div>

<script>
const VMETA = PS.VERTICALS;
const TIER_LABELS = { bronze:'🥉 Bronze', silver:'🥈 Silver', gold:'🥇 Gold' };
const QUOTA_MAX   = { bronze:50, silver:150, gold:Infinity };

// Tools loaded from DB via ToolCatalog (replaces old hardcoded ALL_TOOLS)
let ALL_TOOLS = {};

let activeV      = null;
let usageCount   = 0;
let activeFilter = 'all'; // 'all' | 'accessible' | 'locked'

const TIER_META = {
  bronze: { label: '🥉 Bronze', color: '#cd7f32' },
  silver: { label: '🥈 Silver', color: '#a8a9ad' },
  gold:   { label: '🥇 Gold',   color: '#c9a84c' },
};

// ── Render sidebar verticals ───────────────────────────────────────────────
function renderSidebar() {
  const subs = PS.subs;
  const el   = document.getElementById('sidebar-verticals');
  if (!subs.length) { el.innerHTML = ''; return; }
  el.innerHTML = subs.map(s => {
    const m = VMETA[s.vertical] || {};
    return `<button class="nav-item" data-v="${s.vertical}" onclick="switchVertical('${s.vertical}')"
              style="--vc:${m.color||'#6c63ff'}">
      <span class="ico">${m.icon||'📁'}</span>
      <span>${m.label||s.vertical}</span>
      <span style="margin-left:auto;font-size:.68rem;opacity:.6">${TIER_LABELS[s.tier]?.replace(/[^a-zA-Z]/g,'')||s.tier}</span>
    </button>`;
  }).join('');
}

// ── Render vertical tab bar ────────────────────────────────────────────────
function renderTabBar() {
  const bar = document.getElementById('vtab-bar');
  bar.innerHTML = PS.subs.map(s => {
    const m = VMETA[s.vertical] || {};
    return `<button class="vtab-btn" data-v="${s.vertical}" onclick="switchVertical('${s.vertical}')">
      <span>${m.icon||'📁'}</span>
      <span>${m.label||s.vertical}</span>
      <span class="tier-dot ${s.tier}"></span>
    </button>`;
  }).join('');
}

// ── Switch vertical ────────────────────────────────────────────────────────
async function switchVertical(v) {
  activeV      = v;
  activeFilter = 'all';
  const sub = PS.subForVertical(v);
  const m   = VMETA[v] || {};
  const vc  = m.color || '#6c63ff';

  // Active states with dynamic color
  document.querySelectorAll('.vtab-btn').forEach(b => {
    const isActive = b.dataset.v === v;
    b.classList.toggle('active', isActive);
    b.style.color = isActive ? vc : '';
    b.style.borderBottomColor = isActive ? vc : 'transparent';
  });
  document.querySelectorAll('.nav-item[data-v]').forEach(b => {
    const isActive = b.dataset.v === v;
    b.classList.toggle('active', isActive);
    if (isActive) { b.style.background = m.bg || ''; b.style.color = vc; }
    else          { b.style.background = ''; b.style.color = ''; }
  });

  document.getElementById('topbar-title').textContent = `${m.icon || ''} ${m.label || v}`;
  document.getElementById('topbar-sub').textContent   = sub ? `${TIER_LABELS[sub.tier]} · accès aux outils ${m.label}` : '';

  await updateQuota(v, sub);
  renderTools(v, sub, 'all');
}

// ── Set filter and re-render ───────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  renderTools(activeV, PS.subForVertical(activeV), f);
}

// ── Update quota display ───────────────────────────────────────────────────
async function updateQuota(v, sub) {
  if (!sub) return;
  const count = await PS.getMonthlyUsage();
  usageCount  = count;
  const max   = QUOTA_MAX[sub.tier] ?? 50;
  const pct   = max === Infinity ? 5 : Math.min(100, Math.round(count/max*100));
  const color = VMETA[v]?.color || '#6c63ff';
  const pill  = document.getElementById('quota-pill');
  pill.style.display = 'flex';
  document.getElementById('quota-text').textContent = max === Infinity ? `${count} générés` : `${count} / ${max}`;
  const fill = document.getElementById('quota-fill');
  fill.style.width      = pct + '%';
  fill.style.background = pct > 80 ? '#ef4444' : color;
}

// ── Build accessible tool card HTML ───────────────────────────────────────
function accessibleCard(t, color, v) {
  const hasBadge = t.featured || t.isNew;
  const badge    = t.featured
    ? '<span class="tc-badge featured">⭐ Populaire</span>'
    : t.isNew ? '<span class="tc-badge new-tool">Nouveau</span>' : '';
  return `
    <div class="tool-card accessible${hasBadge?' has-badge':''}"
         style="border-color:transparent"
         onmouseover="this.style.borderColor='${color}'"
         onmouseout="this.style.borderColor='transparent'"
         onclick="window.location.href='${ToolCatalog.toolUrl(t.slug)}'">
      ${badge}
      <span class="tc-icon">${t.icon}</span>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}</div>
      <a href="${ToolCatalog.toolUrl(t.slug)}" class="tc-action" style="color:${color}">Utiliser →</a>
    </div>`;
}

// ── Build locked tool card HTML ────────────────────────────────────────────
function lockedCard(t, color, v) {
  const hasBadge  = t.featured || t.isNew;
  const badge     = t.featured
    ? '<span class="tc-badge featured">⭐ Populaire</span>'
    : t.isNew ? '<span class="tc-badge new-tool">Nouveau</span>' : '';
  const reason = t._access?.reason === 'upgrade_required'
    ? `Disponible en ${TIER_LABELS[t._access.required]}`
    : 'Abonnement requis';
  return `
    <div class="tool-card locked${hasBadge?' has-badge':''}">
      <span class="lock-overlay">🔒</span>
      ${badge}
      <span class="tc-icon">${t.icon}</span>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}</div>
      <div class="tc-upgrade">
        <span>${reason}</span>
        <a href="/tarifs.html?v=${v}" class="tc-upgrade-link" style="color:${color}">Upgrade →</a>
      </div>
    </div>`;
}

// ── Render tools for a vertical ────────────────────────────────────────────
function renderTools(v, sub, filter = 'all') {
  const content = document.getElementById('content');
  const tools   = ALL_TOOLS[v] || [];
  const m       = VMETA[v] || {};
  const color   = m.color || '#6c63ff';
  const max     = sub ? (QUOTA_MAX[sub.tier] ?? 50) : 0;
  const pct     = max === Infinity ? 5 : Math.min(100, Math.round(usageCount/max*100));

  // Annotate each tool with its access result
  const annotated = tools.map(t => ({ ...t, _access: PS.canUseTool(t.slug, t.tier, v) }));
  const accessible = annotated.filter(t => t._access.allowed);
  const locked     = annotated.filter(t => !t._access.allowed);

  // Apply filter
  const visible = filter === 'accessible' ? accessible
                : filter === 'locked'     ? locked
                : annotated;

  // Group visible tools by tier; within each tier: featured first, then alphabetical
  const byTier = { bronze: [], silver: [], gold: [] };
  visible.forEach(t => { (byTier[t.tier] = byTier[t.tier] || []).push(t); });
  Object.values(byTier).forEach(g => g.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0)));

  // Banner
  const bannerStyle = `background:${m.bg||'rgba(108,99,255,.1)'};border-color:${m.border||'rgba(108,99,255,.3)'};color:${color}`;
  let html = `
    <div class="v-banner" style="${bannerStyle}">
      <div class="v-banner-left">
        <span class="v-banner-icon">${m.icon||'📁'}</span>
        <div>
          <div class="v-banner-title">${m.label||v}</div>
          <div class="v-banner-sub">${sub ? TIER_LABELS[sub.tier] + ' · ' + (max===Infinity?'Illimité':max+' générations/mois') : 'Aucun abonnement actif'}</div>
        </div>
      </div>
      <div class="v-banner-right">
        <div class="v-banner-quota">${max===Infinity ? usageCount+' utilisées' : 'Quota: '+usageCount+' / '+max}</div>
        <div class="v-banner-bar"><div class="v-banner-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;

  // Header: accessible count + filter buttons
  const filters = [
    { key:'all',        label:`Tous (${tools.length})` },
    { key:'accessible', label:`Accessibles (${accessible.length})` },
    { key:'locked',     label:`Verrouillés (${locked.length})` },
  ];
  html += `<div class="tools-header">
    <h2>
      <span style="color:${color}">${accessible.length}</span>
      <span style="color:var(--muted);font-weight:400"> / ${tools.length} accessibles</span>
    </h2>
    <div class="filter-row">
      ${filters.map(f => `
        <button class="filter-btn${filter===f.key?' active':''}"
                style="${filter===f.key?'color:'+color+';border-color:'+color:''}"
                onclick="setFilter('${f.key}')">${f.label}</button>`).join('')}
    </div>
  </div>`;

  // Tier sections
  let hasContent = false;
  ['bronze','silver','gold'].forEach(tier => {
    const group = byTier[tier];
    if (!group || !group.length) return;
    hasContent = true;
    const tc           = TIER_META[tier];
    const tierAccCount = group.filter(t => t._access.allowed).length;
    const countLabel   = filter === 'all'
      ? `${tierAccCount} / ${group.length} accessibles`
      : `${group.length} outil${group.length > 1 ? 's' : ''}`;

    html += `<div class="tier-section">
      <div class="tier-section-header">
        <span class="tier-section-label" style="color:${tc.color}">${tc.label}</span>
        <span class="tier-section-count">${countLabel}</span>
      </div>
      <div class="tools-grid">`;

    group.forEach(t => {
      html += t._access.allowed ? accessibleCard(t, color, v) : lockedCard(t, color, v);
    });

    html += `</div></div>`;
  });

  // Empty state for filter with no results
  if (!hasContent) {
    html += `<div style="text-align:center;padding:48px 20px;color:var(--muted);font-size:.9rem;">
      Aucun outil dans cette catégorie.
      <button onclick="setFilter('all')" style="margin-left:8px;background:none;border:none;color:${color};cursor:pointer;font-weight:600;font-size:.9rem;">Voir tous →</button>
    </div>`;
  }

  content.innerHTML = html;
}

// ── No subscription state ──────────────────────────────────────────────────
function renderNoSub() {
  document.getElementById('vtab-bar').innerHTML = '';
  document.getElementById('topbar-title').textContent = 'Mon espace';
  document.getElementById('topbar-sub').textContent   = 'Aucun abonnement actif';
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="big">🚀</div>
      <h2>Choisissez votre verticale</h2>
      <p>Sélectionnez le secteur qui correspond à votre métier.<br>Vos outils IA seront disponibles immédiatement après souscription.</p>
      <a href="/tarifs.html" class="btn-cta">Voir les offres →</a>
    </div>`;
}

// ── Welcome banner ─────────────────────────────────────────────────────────
function maybeShowWelcome() {
  const welcome = new URLSearchParams(window.location.search).get('welcome');
  if (!welcome) return;
  const v = welcome;
  const m = VMETA[v];
  if (!m) return;
  const banner = document.createElement('div');
  banner.className = 'welcome-banner';
  banner.innerHTML = `<span style="font-size:1.4rem">${m.icon}</span> <span>Bienvenue ! Votre accès <strong>${m.label}</strong> est actif. Bonne génération ! ✨</span> <button onclick="this.closest('.welcome-banner').remove()">✕</button>`;
  document.getElementById('content').prepend(banner);
  window.history.replaceState({}, '', '/dashboard.html');
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  const ok = await PS.requireAuth('/dashboard.html');
  if (!ok) return;

  document.getElementById('sb-email').textContent = PS.session.user.email;

  if (!PS.hasAnySubscription()) {
    renderNoSub();
    return;
  }

  // Load tools from database (replaces hardcoded ALL_TOOLS)
  const catalog = await ToolCatalog.load();
  if (catalog.source === 'db' && catalog.tools) {
    ALL_TOOLS = catalog.tools;
    console.log('[Dashboard] Tools loaded from DB:', Object.keys(ALL_TOOLS).map(k => `${k}:${ALL_TOOLS[k].length}`).join(', '));
  }

  renderSidebar();
  renderTabBar();

  // Default to first subscribed vertical (or ?v= param)
  const urlV = new URLSearchParams(window.location.search).get('v');
  const firstV = (urlV && PS.subForVertical(urlV)) ? urlV : PS.subs[0]?.vertical;
  await switchVertical(firstV);
  maybeShowWelcome();
}

init();
</script>
</body>
