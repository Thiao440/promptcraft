<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Espace — The Prompt Studio</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%230c0b09'/><text x='50' y='68' font-family='Georgia,serif' font-size='52' font-style='italic' font-weight='bold' fill='%23c9a84c' text-anchor='middle'>PS</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0b09;--surface:#111009;--card:#1a1814;--border:#2e2a24;
  --gold:#c9a84c;--cream:#f0ead8;--muted:#8a8070;--em:#00897b;
  --bronze:#cd7f32;--silver-tier:#a8a9ad;
}
body{background:var(--bg);color:var(--cream);font-family:'Outfit',sans-serif;overflow-x:hidden;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.a1{animation:fadeUp 0.5s ease both 0s;}
.a2{animation:fadeUp 0.5s ease both 0.08s;}
.a3{animation:fadeUp 0.5s ease both 0.16s;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(12,11,9,0.97);
  backdrop-filter:blur(18px);border-bottom:1px solid var(--border);
  padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:60px;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;
  color:var(--cream);text-decoration:none;letter-spacing:0.02em;}
.nav-logo em{color:var(--gold);font-style:italic;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-tier{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500;}
.tier-badge-bronze{background:rgba(205,127,50,.15);color:var(--bronze);}
.tier-badge-silver{background:rgba(168,169,173,.15);color:var(--silver-tier);}
.tier-badge-gold  {background:rgba(201,168,76,.15);color:var(--gold);}
.nav-user{font-size:13px;color:var(--muted);}
.btn-sm{background:transparent;color:var(--muted);border:1px solid var(--border);
  border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;
  font-family:'Outfit',sans-serif;text-decoration:none;transition:all 0.2s;}
.btn-sm:hover{border-color:var(--gold);color:var(--gold);}

/* ── SIDEBAR + MAIN ── */
.layout{display:flex;min-height:100vh;padding-top:60px;}
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  padding:32px 0;position:fixed;top:60px;left:0;bottom:0;overflow-y:auto;}
.sidebar-section{padding:0 20px;margin-bottom:8px;}
.sidebar-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--muted);padding:12px 16px 6px;}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 16px;
  color:var(--muted);text-decoration:none;font-size:13px;border-radius:8px;
  transition:all 0.15s;cursor:pointer;border:none;background:none;width:100%;text-align:left;}
.sidebar-link:hover{color:var(--cream);background:rgba(255,255,255,0.04);}
.sidebar-link.active{color:var(--cream);background:rgba(201,168,76,0.08);}
.sidebar-link .icon{font-size:16px;width:20px;text-align:center;}
.sidebar-link.locked{opacity:0.4;cursor:default;}
.sidebar-link.locked:hover{color:var(--muted);background:none;}
.sidebar-divider{height:1px;background:var(--border);margin:12px 20px;}
.upgrade-box{margin:20px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);
  border-radius:10px;padding:16px;}
.upgrade-box p{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
.upgrade-box a{display:block;text-align:center;background:var(--gold);color:#0c0b09;
  border-radius:7px;padding:8px;font-size:12px;font-weight:600;text-decoration:none;}

/* ── MAIN CONTENT ── */
.main{margin-left:240px;flex:1;padding:40px 48px;}
.page-header{margin-bottom:40px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3vw,40px);font-weight:300;}
.page-title em{color:var(--gold);font-style:italic;}
.page-sub{font-size:14px;color:var(--muted);margin-top:6px;}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--cream);}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;opacity:0.6;}

/* ── VERTICAL TABS ── */
.vtabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
.vtab{background:none;border:1px solid var(--border);border-radius:8px;
  padding:8px 16px;font-size:13px;color:var(--muted);cursor:pointer;
  font-family:'Outfit',sans-serif;transition:all 0.15s;}
.vtab.active,.vtab:hover{border-color:var(--gold);color:var(--cream);}

/* ── TOOLS GRID ── */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.tool-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:22px;display:flex;flex-direction:column;gap:10px;transition:all 0.2s;position:relative;}
.tool-card:not(.locked):hover{border-color:var(--gold);transform:translateY(-2px);}
.tool-card.locked{opacity:0.55;}
.tool-card-top{display:flex;align-items:flex-start;justify-content:space-between;}
.tool-icon{font-size:24px;}
.tier-pill{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;flex-shrink:0;}
.pill-bronze{background:rgba(205,127,50,.15);color:var(--bronze);}
.pill-silver{background:rgba(168,169,173,.15);color:var(--silver-tier);}
.pill-gold  {background:rgba(201,168,76,.15);color:var(--gold);}
.tool-name{font-size:14px;font-weight:500;color:var(--cream);line-height:1.3;}
.tool-desc{font-size:12px;color:var(--muted);line-height:1.5;flex:1;}
.tool-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.btn-tool{background:var(--gold);color:#0c0b09;border:none;border-radius:7px;
  padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;
  font-family:'Outfit',sans-serif;text-decoration:none;transition:opacity 0.2s;}
.btn-tool:hover{opacity:0.85;}
.lock-msg{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}

/* ── LOADING / EMPTY ── */
.spinner-wrap{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-sub{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:48px;text-align:center;max-width:500px;margin:0 auto;}
.empty-sub h3{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;margin-bottom:12px;}
.empty-sub p{color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.6;}
.btn-primary{background:var(--gold);color:#0c0b09;border:none;border-radius:9px;
  padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;
  font-family:'Outfit',sans-serif;text-decoration:none;}

/* ── USAGE BAR ── */
.usage-bar-wrap{background:var(--border);border-radius:4px;height:6px;margin-top:8px;overflow:hidden;}
.usage-bar-fill{height:100%;border-radius:4px;background:var(--gold);transition:width 0.4s;}
.usage-bar-fill.warning{background:#e67e22;}
.usage-bar-fill.danger{background:#e74c3c;}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{display:none;}
  .main{margin-left:0;padding:24px 20px;}
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  nav{padding:0 20px;}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">The Prompt <em>Studio</em></a>
  <div class="nav-right">
    <span class="nav-tier tier-badge-bronze" id="nav-tier" style="display:none"></span>
    <span class="nav-user" id="nav-user"></span>
    <a href="/account.html" class="btn-sm">Mon compte</a>
    <button class="btn-sm" onclick="PS.logout()">Déconnexion</button>
  </div>
</nav>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <p class="sidebar-label">Mes outils</p>
    <button class="sidebar-link active" onclick="showVertical('immo',this)"><span class="icon">🏠</span> Immobilier</button>
    <button class="sidebar-link" onclick="showVertical('commerce',this)"><span class="icon">🛒</span> Commerce</button>
    <button class="sidebar-link" onclick="showVertical('legal',this)"><span class="icon">⚖️</span> Juridique</button>
    <button class="sidebar-link" onclick="showVertical('finance',this)"><span class="icon">💼</span> Finance</button>

    <div class="sidebar-divider"></div>
    <p class="sidebar-label">Compte</p>
    <a href="/account.html" class="sidebar-link"><span class="icon">👤</span> Mon abonnement</a>
    <a href="/account.html#history" class="sidebar-link"><span class="icon">📜</span> Historique</a>

    <div id="upgrade-box-wrap"></div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- Header -->
    <div class="page-header a1">
      <h1 class="page-title">Mes outils <em>IA</em></h1>
      <p class="page-sub" id="page-sub">Chargement…</p>
    </div>

    <!-- Stats -->
    <div class="stats-bar a2" id="stats-bar" style="display:none">
      <div class="stat-card">
        <div class="stat-val" id="stat-tier">—</div>
        <div class="stat-label">Abonnement actif</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-usage">—</div>
        <div class="stat-label">Générations ce mois</div>
        <div class="usage-bar-wrap"><div class="usage-bar-fill" id="usage-bar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-quota">—</div>
        <div class="stat-label">Quota mensuel</div>
        <div class="stat-sub" id="stat-renewal"></div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-tools">—</div>
        <div class="stat-label">Outils disponibles</div>
      </div>
    </div>

    <!-- Vertical tabs -->
    <div class="vtabs a3" id="vtabs" style="display:none">
      <button class="vtab active" onclick="showVertical('immo',this)">🏠 Immobilier</button>
      <button class="vtab" onclick="showVertical('commerce',this)">🛒 Commerce</button>
      <button class="vtab" onclick="showVertical('legal',this)">⚖️ Juridique</button>
      <button class="vtab" onclick="showVertical('finance',this)">💼 Finance</button>
    </div>

    <!-- Tools grid -->
    <div id="content">
      <div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--muted);font-size:14px">Chargement…</p></div>
    </div>

  </main>
</div>

<script src="/js/ps-auth.js"></script>
<script>
// ── Tools data (same as tarifs.html) ─────────────────────────────────────
const ALL_TOOLS = {
  immo: [
    { slug:'immo-annonce',        name:'Générateur d\'annonces',       desc:'Annonce immobilière percutante en 30 secondes',          icon:'📝', tier:'bronze' },
    { slug:'immo-email-suivi',    name:'Email de suivi acquéreur',     desc:'Relancez vos prospects avec des emails personnalisés',   icon:'📧', tier:'bronze' },
    { slug:'immo-rapport-visite', name:'Rapport de visite',            desc:'Compte-rendu de visite professionnel automatisé',        icon:'📋', tier:'silver' },
    { slug:'immo-analyse-prix',   name:'Analyse comparative de prix',  desc:'Analyse de marché argumentée pour votre client',        icon:'📊', tier:'silver' },
    { slug:'immo-script-prosp',   name:'Script de prospection',        desc:'Scripts d\'appel et SMS pour décrocher des mandats',    icon:'📞', tier:'silver' },
    { slug:'immo-mandat-exclusif',name:'Argumentaire mandat exclusif', desc:'Argumentaire pour convaincre de signer en exclusivité', icon:'🏆', tier:'gold'   },
    { slug:'immo-posts-sociaux',  name:'Posts réseaux sociaux',        desc:'Contenu LinkedIn/Instagram pour promouvoir vos biens',  icon:'📱', tier:'gold'   },
    { slug:'immo-email-vendeur',  name:'Email présentation vendeur',   desc:'Email professionnel pour présenter une offre',          icon:'💌', tier:'gold'   },
  ],
  commerce: [
    { slug:'commerce-fiche-produit',   name:'Générateur de fiches produits',  desc:'Fiches produits SEO-optimisées en masse',              icon:'🛒', tier:'bronze' },
    { slug:'commerce-email-promo',     name:'Email promotionnel',             desc:'Emails marketing qui convertissent',                   icon:'📧', tier:'bronze' },
    { slug:'commerce-seo-description', name:'Description SEO',                desc:'Optimisez vos descriptions pour le référencement',     icon:'🔍', tier:'silver' },
    { slug:'commerce-posts-sociaux',   name:'Contenu réseaux sociaux',        desc:'Posts pour Instagram, Facebook, TikTok',               icon:'📱', tier:'silver' },
    { slug:'commerce-relance-panier',  name:'Relance panier abandonné',       desc:'Récupérez jusqu\'à 15% des paniers abandonnés',        icon:'🛍️', tier:'silver' },
    { slug:'commerce-chatbot-sav',     name:'Script chatbot SAV',             desc:'Script de chatbot service client complet',             icon:'💬', tier:'gold'   },
    { slug:'commerce-strategie',       name:'Stratégie de contenu',           desc:'Plan de contenu marketing mensuel complet',            icon:'🎯', tier:'gold'   },
    { slug:'commerce-analyse-concur',  name:'Analyse concurrentielle',        desc:'Positionnement IA face à la concurrence',             icon:'📊', tier:'gold'   },
  ],
  legal: [
    { slug:'legal-courrier',          name:'Rédacteur de courriers',      desc:'Courriers juridiques professionnels en quelques clics', icon:'✉️', tier:'bronze' },
    { slug:'legal-resume-contrat',    name:'Résumé de contrat',           desc:'Points clés d\'un contrat en moins d\'1 minute',        icon:'📋', tier:'bronze' },
    { slug:'legal-note-juridique',    name:'Note juridique',              desc:'Note de synthèse juridique structurée',                icon:'⚖️', tier:'silver' },
    { slug:'legal-analyse-clause',    name:'Analyse de clause',           desc:'Identifiez les risques dans une clause contractuelle', icon:'🔎', tier:'silver' },
    { slug:'legal-mise-en-demeure',   name:'Mise en demeure',             desc:'Mise en demeure légalement solide',                    icon:'📜', tier:'silver' },
    { slug:'legal-contrat-standard',  name:'Contrat type',                desc:'Contrat adapté à votre situation',                    icon:'📄', tier:'gold'   },
    { slug:'legal-jurisprudence',     name:'Recherche jurisprudentielle', desc:'Synthèse de jurisprudence sur une question de droit', icon:'🏛️', tier:'gold'   },
    { slug:'legal-plaidoirie',        name:'Arguments de plaidoirie',     desc:'Structurez vos arguments pour une audience',          icon:'🎤', tier:'gold'   },
  ],
  finance: [
    { slug:'finance-synthese',         name:'Synthèse de rapport',         desc:'Résumez un rapport financier complexe en points clés', icon:'📊', tier:'bronze' },
    { slug:'finance-email-pro',        name:'Email professionnel finance', desc:'Emails formels pour dirigeants et investisseurs',      icon:'📧', tier:'bronze' },
    { slug:'finance-analyse-kpi',      name:'Analyse de KPIs',             desc:'Interprétez vos indicateurs financiers avec l\'IA',   icon:'📈', tier:'silver' },
    { slug:'finance-rapport-invest',   name:'Rapport d\'investissement',   desc:'Analyse d\'investissement structurée',                icon:'💰', tier:'silver' },
    { slug:'finance-budget-prevision', name:'Budget prévisionnel',         desc:'Commentaire et analyse de votre budget',              icon:'📅', tier:'silver' },
    { slug:'finance-deck-invest',      name:'Deck investisseur',           desc:'Contenu d\'un pitch deck pour levée de fonds',        icon:'🚀', tier:'gold'   },
    { slug:'finance-strategie',        name:'Stratégie financière',        desc:'Recommandations IA pour optimiser votre stratégie',   icon:'🎯', tier:'gold'   },
    { slug:'finance-due-diligence',    name:'Due diligence',               desc:'Check-list et analyse IA pour une acquisition',      icon:'🔬', tier:'gold'   },
  ],
};
const QUOTA = { bronze: 50, silver: 150, gold: Infinity };
const TIER_ORDER = { bronze: 1, silver: 2, gold: 3 };
const TIER_LABEL = { bronze: '🥉 Bronze', silver: '🥈 Silver', gold: '🥇 Gold' };
let currentVertical = 'immo';

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot() {
  const ok = await PS.requireAuth('/dashboard');
  if (!ok) return;

  const user = PS.session.user;
  const sub  = PS.sub;

  // Nav
  const name = user.user_metadata?.full_name || user.email.split('@')[0];
  document.getElementById('nav-user').textContent = name;
  if (sub) {
    const el = document.getElementById('nav-tier');
    el.textContent = TIER_LABEL[sub.tier] || sub.tier;
    el.className = `nav-tier tier-badge-${sub.tier}`;
    el.style.display = 'inline-block';
  }

  if (!sub) {
    renderNoSub();
    return;
  }

  // Stats
  const usage = await PS.getMonthlyUsage();
  const quota = QUOTA[sub.tier];
  const pct   = quota === Infinity ? 5 : Math.min(100, Math.round(usage / quota * 100));
  const availableTools = Object.values(ALL_TOOLS).flat()
    .filter(t => PS.canUseTool(t.slug, t.tier, t.vertical).allowed).length;

  document.getElementById('stat-tier').textContent = TIER_LABEL[sub.tier];
  document.getElementById('stat-usage').textContent = usage;
  document.getElementById('stat-quota').textContent = quota === Infinity ? '∞' : quota;
  document.getElementById('stat-tools').textContent = availableTools + ' / 32';
  document.getElementById('page-sub').textContent =
    `Bonjour ${name} — ${availableTools} outils disponibles avec votre abonnement ${sub.tier}`;

  const bar = document.getElementById('usage-bar');
  bar.style.width = pct + '%';
  if (pct >= 90) bar.className = 'usage-bar-fill danger';
  else if (pct >= 70) bar.className = 'usage-bar-fill warning';

  if (sub.current_period_end) {
    const d = new Date(sub.current_period_end).toLocaleDateString('fr-FR');
    document.getElementById('stat-renewal').textContent = `Renouvellement le ${d}`;
  }

  document.getElementById('stats-bar').style.display = 'grid';
  document.getElementById('vtabs').style.display = 'flex';

  // Upgrade box if not Gold
  if (sub.tier !== 'gold') {
    document.getElementById('upgrade-box-wrap').innerHTML = `
      <div class="upgrade-box">
        <p>Passez à l'offre supérieure pour débloquer plus d'outils.</p>
        <a href="/tarifs.html">Voir les offres ↗</a>
      </div>`;
  }

  showVertical('immo', document.querySelector('.vtab'));
}

// ── Render tools for a vertical ───────────────────────────────────────────
function showVertical(v, tabEl) {
  currentVertical = v;

  // Update all tab buttons (both sidebar + main)
  document.querySelectorAll('.vtab, .sidebar-link[onclick*="showVertical"]').forEach(t => {
    t.classList.toggle('active', t.getAttribute('onclick')?.includes(`'${v}'`));
  });

  const tools = ALL_TOOLS[v] || [];
  const content = document.getElementById('content');

  content.innerHTML = `<div class="tools-grid">${tools.map(t => renderToolCard(t, v)).join('')}</div>`;
}

function renderToolCard(t, vertical) {
  const access = PS.canUseTool(t.slug, t.tier, vertical);
  const pillClass = `pill-${t.tier}`;
  const tierLabel = t.tier.charAt(0).toUpperCase() + t.tier.slice(1);

  if (access.allowed) {
    return `
      <div class="tool-card">
        <div class="tool-card-top">
          <span class="tool-icon">${t.icon}</span>
          <span class="tier-pill ${pillClass}">${tierLabel}</span>
        </div>
        <div class="tool-name">${t.name}</div>
        <div class="tool-desc">${t.desc}</div>
        <div class="tool-footer">
          <a href="/tools/${t.slug}.html" class="btn-tool">Utiliser →</a>
        </div>
      </div>`;
  } else {
    let lockMsg = '🔒 ';
    if (access.reason === 'upgrade_required') lockMsg += `Nécessite ${access.required}`;
    else if (access.reason === 'wrong_vertical') lockMsg += `Réservé à votre verticale`;
    else if (access.reason === 'no_subscription') lockMsg += 'Abonnement requis';
    else lockMsg += 'Non disponible';

    return `
      <div class="tool-card locked">
        <div class="tool-card-top">
          <span class="tool-icon">${t.icon}</span>
          <span class="tier-pill ${pillClass}">${tierLabel}</span>
        </div>
        <div class="tool-name">${t.name}</div>
        <div class="tool-desc">${t.desc}</div>
        <div class="tool-footer">
          <span class="lock-msg">${lockMsg}</span>
          <a href="/tarifs.html" style="font-size:11px;color:var(--gold);text-decoration:none;">Upgrader</a>
        </div>
      </div>`;
  }
}

function renderNoSub() {
  document.getElementById('page-sub').textContent = 'Choisissez un abonnement pour accéder aux outils';
  document.getElementById('content').innerHTML = `
    <div class="empty-sub">
      <h3>Aucun abonnement actif</h3>
      <p>Souscrivez à une offre Bronze, Silver ou Gold pour accéder à vos outils IA.</p>
      <a href="/tarifs.html" class="btn-primary">Voir les tarifs →</a>
    </div>`;
}

boot();
</script>
</body>
</html>
