[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# API routes → Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Pretty URLs
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/complete-profile"
  to = "/complete-profile.html"
  status = 200

# Generic dynamic tool page (pretty URL)
# /t/immo-annonce → /tool.html?slug=immo-annonce
# Runs AFTER static file check, so existing /tools/*.html pages still work
[[redirects]]
  from = "/t/:slug"
  to = "/tool.html?slug=:slug"
  status = 200

# After Lemon Squeezy checkout success
[[redirects]]
  from = "/merci"
  to = "/merci.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP disabled for local development — all pages use inline scripts.
    # TODO: Re-enable for production after extracting inline scripts to .js files.
    # Content-Security-Policy = "..."

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
