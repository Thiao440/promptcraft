<!DOCTYPE html>
<html lang="en" data-lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — The Prompt Studio</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="/js/ps-lang.js?v=1.1"></script>
<script src="/js/ps-i18n.js?v=1.0"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0c0b09;--card:#1a1814;--border:#2e2a24;--gold:#c9a84c;--cream:#f0ead8;--muted:#8a8070;}
body{background:var(--bg);color:var(--cream);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;position:fixed;top:24px;left:40px;text-decoration:none;color:var(--cream);}
.logo em{color:var(--gold);font-style:italic;}
.num{font-family:'Cormorant Garamond',serif;font-size:clamp(100px,25vw,200px);font-weight:300;line-height:1;color:var(--card);}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,48px);font-weight:300;margin-bottom:12px;}
h1 em{color:var(--gold);font-style:italic;}
p{font-size:15px;color:var(--muted);margin-bottom:40px;max-width:420px;margin-left:auto;margin-right:auto;}
.btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn-p{background:var(--gold);color:#000;padding:14px 32px;font-weight:600;font-size:14px;text-decoration:none;letter-spacing:0.05em;transition:all 0.25s;}
.btn-p:hover{background:#e8c97a;transform:translateY(-2px);}
.btn-g{background:none;border:1px solid var(--border);color:var(--cream);padding:14px 32px;font-size:14px;text-decoration:none;letter-spacing:0.04em;transition:all 0.25s;}
.btn-g:hover{border-color:var(--gold);color:var(--gold);}
</style>
</head>
<body>
<a href="index.html" class="logo">The Prompt<em>Studio</em></a>
<div>
  <div class="num">404</div>
  <h1>Page <em>introuvable</em></h1>
  <p>Cette page n'existe pas ou a été déplacée. Retrouvez nos toolkits IA depuis la page d'accueil.</p>
  <div class="btns">
    <a href="index.html" class="btn-p">Retour à l'accueil</a>
    <a href="contact.html" class="btn-g">Nous contacter</a>
  </div>
</div>
</body>
</html>
